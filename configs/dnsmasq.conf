# resolve standard queries via public resolvers first
server=8.8.8.8
server=1.1.1.1

# listen strictly to local requests
listen-address=127.0.0.1
port=53

# map mock domain to loopback for secure staging testing
address=/brokendomain.local/127.0.0.1
address=/mail.brokendomain.local/127.0.0.1

# failure simulation 1: duplicate spf records published to same root (rfc violation)
txt-record=brokendomain.local,"v=spf1 include:_spf.google.com ~all"
txt-record=brokendomain.local,"v=spf1 include:sendgrid.net -all"

# failure simulation 2: 11/10 lookup budget violation (uncomment to test)
# txt-record=brokendomain.local,"v=spf1 include:1.com include:2.com include:3.com include:4.com include:5.com include:6.com include:7.com include:8.com include:9.com include:10.com include:11.com ~all"

# failure simulation 3: missing dmarc subdomainTXT (returns empty string)
txt-record=_dmarc.brokendomain.local,""